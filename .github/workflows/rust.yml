name: Loom Scaffold CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace

      - name: Build workspace
        run: cargo build --workspace
