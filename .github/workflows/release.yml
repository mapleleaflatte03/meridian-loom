name: Loom Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests
        run: cargo test --workspace --locked

      - name: Package release
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          artifact="$(./scripts/package_release.sh --version "${GITHUB_REF_NAME}" --output-dir dist)"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          if [[ -f "${artifact}.sha256" ]]; then
            echo "checksum=${artifact}.sha256" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail
          files=("${ARTIFACT}")
          if [[ -n "${CHECKSUM}" ]]; then
            files+=("${CHECKSUM}")
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" --verify-tag --title "${GITHUB_REF_NAME}" --notes "Binary-first Meridian Loom release."
          fi
